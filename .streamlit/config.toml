[theme]
base = "dark"
primaryColor = "#D97757"
backgroundColor = "#262624"
secondaryBackgroundColor = "#30302E"
textColor = "#ECEAE4"
font = "sans serif"

[server]
headless = true

[browser]
gatherUsageStats = false

[client]
# Hide the "Deploy" button and developer menu from the top-right toolbar
toolbarMode = "minimal"
