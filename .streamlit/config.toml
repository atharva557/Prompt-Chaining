[theme]
base = "dark"
primaryColor = "#7aa2f7"
backgroundColor = "#1a1b26"
secondaryBackgroundColor = "#24283b"
textColor = "#dde3f7"
font = "sans serif"

[server]
headless = true

[browser]
gatherUsageStats = false

[client]
# Hide the "Deploy" button and developer menu from the top-right toolbar
toolbarMode = "minimal"
